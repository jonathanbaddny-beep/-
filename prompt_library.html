<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⚡ ספריית פרומפטים</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f7f6f2;--surface:#ffffff;--surface2:#f0efe9;
  --text:#1a1a18;--text2:#6b6a64;--text3:#9b9a94;
  --accent:#1d9e75;--accent-light:#e1f5ee;--accent-dark:#0f6e56;
  --border:rgba(0,0,0,0.08);--border2:rgba(0,0,0,0.14);
  --radius:14px;--radius-sm:8px;
  --shadow:0 1px 3px rgba(0,0,0,0.06),0 4px 16px rgba(0,0,0,0.05);
  --font:'Heebo',sans-serif;
}
html{font-size:16px}
body{font-family:var(--font);background:var(--bg);color:var(--text);direction:rtl;min-height:100vh}

/* LAYOUT */
.app{max-width:960px;margin:0 auto;padding:32px 20px}

/* HEADER */
.header{display:flex;align-items:center;justify-content:space-between;margin-bottom:32px;gap:12px;flex-wrap:wrap}
.logo{font-size:24px;font-weight:700;color:var(--text);letter-spacing:-0.5px;display:flex;align-items:center;gap:8px}
.logo-icon{font-size:22px}
.logo span{color:var(--accent)}
.header-actions{display:flex;gap:8px;align-items:center}
.btn-add{background:var(--accent);color:#fff;border:none;border-radius:var(--radius-sm);padding:9px 18px;font-family:var(--font);font-size:14px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:6px;transition:background .15s,transform .1s}
.btn-add:hover{background:var(--accent-dark);transform:translateY(-1px)}
.btn-add:active{transform:translateY(0)}
.btn-icon{background:var(--surface);border:1px solid var(--border2);border-radius:var(--radius-sm);width:38px;height:38px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text2);font-size:16px;transition:all .15s}
.btn-icon:hover{background:var(--accent-light);border-color:var(--accent);color:var(--accent)}
.btn-icon.active{background:var(--accent-light);border-color:var(--accent);color:var(--accent)}

/* SEARCH */
.search-wrap{position:relative;margin-bottom:22px}
.search-input{width:100%;padding:11px 16px 11px 44px;border:1px solid var(--border2);border-radius:var(--radius-sm);font-family:var(--font);font-size:15px;background:var(--surface);color:var(--text);outline:none;transition:border .15s,box-shadow .15s}
.search-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(29,158,117,0.1)}
.search-input::placeholder{color:var(--text3)}
.search-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:16px;pointer-events:none}
.search-clear{position:absolute;left:40px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:18px;cursor:pointer;display:none;background:none;border:none;font-family:var(--font);line-height:1}
.search-clear.visible{display:block}

/* STATS BAR */
.stats{display:flex;gap:10px;margin-bottom:22px;flex-wrap:wrap}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:8px 16px;font-size:13px;color:var(--text2)}
.stat b{color:var(--text);font-weight:600}

/* CATEGORY TABS */
.cats{display:flex;gap:8px;margin-bottom:16px;overflow-x:auto;padding-bottom:4px;scrollbar-width:none}
.cats::-webkit-scrollbar{display:none}
.cat-btn{background:var(--surface);border:1px solid var(--border2);border-radius:20px;padding:7px 16px;font-family:var(--font);font-size:13px;font-weight:500;color:var(--text2);cursor:pointer;white-space:nowrap;transition:all .15s;flex-shrink:0}
.cat-btn:hover{border-color:var(--accent);color:var(--accent)}
.cat-btn.active{background:var(--accent);border-color:var(--accent);color:#fff}

/* SUBCATEGORY */
.subcats{display:flex;gap:6px;margin-bottom:24px;flex-wrap:wrap;min-height:0}
.subcat-btn{background:transparent;border:1px solid var(--border);border-radius:20px;padding:5px 13px;font-family:var(--font);font-size:12px;color:var(--text3);cursor:pointer;transition:all .15s}
.subcat-btn:hover,.subcat-btn.active{background:var(--accent-light);border-color:var(--accent);color:var(--accent-dark);font-weight:500}

/* GRID */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px}

/* CARD */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;cursor:pointer;transition:border-color .15s,transform .12s,box-shadow .15s;position:relative;display:flex;flex-direction:column;gap:10px}
.card:hover{border-color:var(--accent);transform:translateY(-2px);box-shadow:var(--shadow)}
.card-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px}
.card-badges{display:flex;gap:5px;flex-wrap:wrap}
.badge{font-size:11px;font-weight:600;padding:3px 9px;border-radius:20px;background:var(--accent-light);color:var(--accent-dark)}
.badge-sub{background:var(--surface2);color:var(--text2)}
.card-title{font-size:15px;font-weight:600;color:var(--text);line-height:1.4}
.card-desc{font-size:13px;color:var(--text2);line-height:1.6}
.card-preview{font-size:12px;color:var(--text3);background:var(--surface2);border-radius:var(--radius-sm);padding:10px 12px;line-height:1.6;direction:rtl;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;flex:1}
.card-actions{display:flex;gap:6px;margin-top:2px}
.card-btn{flex:1;background:transparent;border:1px solid var(--border2);border-radius:var(--radius-sm);padding:7px 10px;font-family:var(--font);font-size:12px;font-weight:500;color:var(--text2);cursor:pointer;display:flex;align-items:center;justify-content:center;gap:5px;transition:all .15s}
.card-btn:hover{background:var(--accent-light);border-color:var(--accent);color:var(--accent-dark)}
.card-btn.copied{background:var(--accent-light);border-color:var(--accent);color:var(--accent-dark)}
.card-star{background:transparent;border:none;font-size:17px;cursor:pointer;padding:2px 4px;color:#ccc;line-height:1;flex-shrink:0;transition:color .15s,transform .1s}
.card-star:hover{color:#f5a623;transform:scale(1.2)}
.card-star.starred{color:#f5a623}

/* EMPTY STATE */
.empty{text-align:center;padding:80px 20px;grid-column:1/-1}
.empty-icon{font-size:48px;margin-bottom:16px}
.empty p{font-size:16px;margin-bottom:8px;color:var(--text2);font-weight:500}
.empty small{font-size:14px;color:var(--text3)}
.empty .btn-add{margin:20px auto 0;display:inline-flex}

/* MODAL OVERLAY */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:100;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(2px)}
.modal-bg.open{display:flex}
.modal{background:var(--surface);border-radius:var(--radius);padding:32px;width:100%;max-width:560px;max-height:90vh;overflow-y:auto;direction:rtl;box-shadow:0 8px 40px rgba(0,0,0,0.18)}
.modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px}
.modal-header h3{font-size:19px;font-weight:700}
.modal-close{background:none;border:none;font-size:22px;cursor:pointer;color:var(--text3);line-height:1;padding:4px}
.modal-close:hover{color:var(--text)}
.modal label{font-size:13px;color:var(--text2);display:block;margin-bottom:6px;margin-top:16px;font-weight:500}
.modal label:first-of-type{margin-top:0}
.modal input,.modal select,.modal textarea{width:100%;padding:10px 13px;border:1px solid var(--border2);border-radius:var(--radius-sm);font-family:var(--font);font-size:14px;color:var(--text);background:var(--bg);outline:none;transition:border .15s,box-shadow .15s;direction:rtl}
.modal input:focus,.modal select:focus,.modal textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(29,158,117,0.1)}
.modal textarea{resize:vertical;min-height:140px;line-height:1.6}
.modal-footer{display:flex;gap:8px;justify-content:flex-end;margin-top:24px}
.btn-cancel{background:transparent;border:1px solid var(--border2);border-radius:var(--radius-sm);padding:9px 18px;font-family:var(--font);font-size:14px;cursor:pointer;color:var(--text2);transition:all .15s}
.btn-cancel:hover{border-color:var(--border2);background:var(--surface2)}
.btn-save{background:var(--accent);color:#fff;border:none;border-radius:var(--radius-sm);padding:9px 22px;font-family:var(--font);font-size:14px;font-weight:600;cursor:pointer;transition:background .15s}
.btn-save:hover{background:var(--accent-dark)}

/* MANAGE CATEGORIES MODAL */
.cat-list{margin-top:12px}
.cat-item{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;border:1px solid var(--border);border-radius:var(--radius-sm);margin-bottom:8px;background:var(--bg)}
.cat-item-name{font-size:14px;font-weight:500}
.cat-item-count{font-size:12px;color:var(--text3)}
.cat-delete{background:none;border:none;color:var(--text3);cursor:pointer;font-size:16px;padding:2px 6px;border-radius:4px;transition:all .15s}
.cat-delete:hover{background:#fee;color:#c0392b}
.add-cat-row{display:flex;gap:8px;margin-top:16px}
.add-cat-row input{flex:1}

/* VIEW MODAL */
.view-modal{max-width:640px}
.prompt-full{background:var(--surface2);border-radius:var(--radius-sm);padding:18px;font-size:14px;line-height:1.8;color:var(--text);white-space:pre-wrap;direction:rtl;margin:14px 0;border:1px solid var(--border)}
.view-actions{display:flex;gap:8px;flex-wrap:wrap}
.view-actions .card-btn{flex:0 0 auto;padding:9px 18px;font-size:13px;font-weight:500}
.view-meta{font-size:12px;color:var(--text3);margin-top:12px}

/* TOAST */
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(0);background:#1a1a18;color:#fff;padding:11px 22px;border-radius:20px;font-size:14px;font-family:var(--font);z-index:300;opacity:0;transition:opacity .2s,transform .2s;pointer-events:none;direction:rtl;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(-4px)}

/* EXPORT/IMPORT */
.export-row{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap}
.btn-export{background:var(--surface2);border:1px solid var(--border2);border-radius:var(--radius-sm);padding:8px 14px;font-family:var(--font);font-size:13px;cursor:pointer;color:var(--text2);transition:all .15s}
.btn-export:hover{border-color:var(--accent);color:var(--accent)}

/* CHAR COUNT */
.char-count{font-size:11px;color:var(--text3);text-align:left;margin-top:4px}

@media(max-width:600px){
  .grid{grid-template-columns:1fr}
  .header{flex-direction:column;align-items:flex-start}
  .app{padding:20px 14px}
  .modal{padding:24px 18px}
}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="logo"><span class="logo-icon">⚡</span>ספריית <span>פרומפטים</span></div>
    <div class="header-actions">
      <button class="btn-icon" onclick="toggleFavs()" id="fav-btn" title="מועדפים בלבד">★</button>
      <button class="btn-icon" onclick="openCatManager()" title="ניהול קטגוריות">⊞</button>
      <button class="btn-icon" onclick="openSettings()" title="ייצוא / ייבוא">⚙</button>
      <button class="btn-add" onclick="openAdd()">+ פרומפט חדש</button>
    </div>
  </div>

  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input class="search-input" type="text" id="search" placeholder="חיפוש לפי כותרת, תיאור או תוכן..." oninput="onSearch()">
    <button class="search-clear" id="search-clear" onclick="clearSearch()">×</button>
  </div>

  <div class="stats" id="stats"></div>
  <div class="cats" id="cats"></div>
  <div class="subcats" id="subcats"></div>
  <div class="grid" id="grid"></div>
</div>

<!-- ADD / EDIT MODAL -->
<div class="modal-bg" id="modal-add">
  <div class="modal">
    <div class="modal-header">
      <h3 id="modal-title">פרומפט חדש</h3>
      <button class="modal-close" onclick="closeModal('modal-add')">×</button>
    </div>
    <label>כותרת *</label>
    <input id="f-title" type="text" placeholder="שם הפרומפט...">
    <label>תיאור קצר</label>
    <input id="f-desc" type="text" placeholder="מה הפרומפט הזה עושה? (שורה אחת)">
    <label>קטגוריה *</label>
    <select id="f-cat" onchange="updateSubcatOptions()"></select>
    <label>תת-קטגוריה</label>
    <select id="f-subcat"></select>
    <label>תוכן הפרומפט *</label>
    <textarea id="f-body" placeholder="הכנס את הפרומפט כאן..." oninput="updateCharCount()"></textarea>
    <div class="char-count" id="char-count">0 תווים</div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeModal('modal-add')">ביטול</button>
      <button class="btn-save" onclick="savePrompt()">שמור</button>
    </div>
  </div>
</div>

<!-- VIEW MODAL -->
<div class="modal-bg" id="modal-view">
  <div class="modal view-modal">
    <div class="modal-header">
      <div id="view-badges" style="display:flex;gap:6px;flex-wrap:wrap"></div>
      <button class="modal-close" onclick="closeModal('modal-view')">×</button>
    </div>
    <h3 id="view-title" style="font-size:20px;font-weight:700;margin-bottom:6px"></h3>
    <p id="view-desc" style="font-size:14px;color:var(--text2)"></p>
    <div class="prompt-full" id="view-body"></div>
    <div class="view-actions">
      <button class="card-btn" id="view-copy" onclick="copyFromView()">📋 העתק פרומפט</button>
      <button class="card-btn" onclick="shareFromView()">🔗 שתף</button>
      <button class="card-btn" onclick="editFromView()">✏️ ערוך</button>
      <button class="card-btn" style="color:#c0392b;border-color:#fdd" onclick="deleteFromView()">🗑️ מחק</button>
    </div>
    <div class="view-meta" id="view-meta"></div>
  </div>
</div>

<!-- CATEGORY MANAGER -->
<div class="modal-bg" id="modal-cats">
  <div class="modal">
    <div class="modal-header">
      <h3>ניהול קטגוריות</h3>
      <button class="modal-close" onclick="closeModal('modal-cats')">×</button>
    </div>
    <div class="cat-list" id="cat-list"></div>
    <div class="add-cat-row">
      <input id="new-cat-name" type="text" placeholder="שם קטגוריה חדשה..." onkeydown="if(event.key==='Enter')addCategory()">
      <button class="btn-save" onclick="addCategory()">+ הוסף</button>
    </div>
  </div>
</div>

<!-- SETTINGS / EXPORT -->
<div class="modal-bg" id="modal-settings">
  <div class="modal">
    <div class="modal-header">
      <h3>ייצוא וייבוא</h3>
      <button class="modal-close" onclick="closeModal('modal-settings')">×</button>
    </div>
    <p style="font-size:14px;color:var(--text2);line-height:1.6">גבה את הפרומפטים שלך או ייבא מגיבוי קודם.</p>
    <div class="export-row">
      <button class="btn-export" onclick="exportJSON()">📦 ייצוא JSON (גיבוי)</button>
      <button class="btn-export" onclick="exportHTML()">🌐 ייצוא HTML עצמאי</button>
    </div>
    <div style="margin-top:20px">
      <label style="font-size:13px;color:var(--text2);font-weight:500;display:block;margin-bottom:8px">ייבוא מ-JSON:</label>
      <input type="file" accept=".json" id="import-file" onchange="importJSON(event)" style="font-size:13px">
    </div>
    <div style="margin-top:20px;padding-top:20px;border-top:1px solid var(--border)">
      <p style="font-size:13px;color:var(--text3)">סה"כ <b id="export-count">0</b> פרומפטים בספרייה</p>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const STORAGE_KEY='prompt_lib_v3';
const CATS_KEY='prompt_lib_cats_v3';

const DEFAULT_CATS={
  'כתיבה ותוכן':['שיווק','בלוג ומאמרים','מדיה חברתית','אימייל'],
  'פיתוח וטק':['קוד ופיתוח','דיבאג','ארכיטקטורה','דוקומנטציה'],
  'וידאו ועריכה':['DaVinci Resolve','תסריט','תיאור סצנה','פוסט-פרודקשן'],
  'רחפן ו-MTB':['תכנון טיסה','עריכת צילום','שאלות ציוד','אחרי הרידה'],
  'עבודה ותפעול':['ניהול','NVIDIA','תיאורי תפקיד','אנליזה'],
  'כללי':['מידע כללי','רעיונות','שונות']
};

const DEFAULT_PROMPTS=[
  {id:'p1',title:'תיאור סצנת MTB סינמטי',desc:'יוצר תיאור ויזואלי מרהיב לסצנת רכיבה',cat:'רחפן ו-MTB',subcat:'תיאור סצנה',body:'תאר סצנת רכיבת הרים סינמטית ב-[מיקום]. הרוכב מגיע מ[כיוון], קצב העריכה עולה עם המוזיקה. כלול: תאורה, זווית המצלמה, תנועת הרחפן, ואנרגיית הסצנה. הסגנון: קולנועי-מלחיץ.',starred:true,created:Date.now()-86400000*5},
  {id:'p2',title:'Color Grade Teal & Orange ב-DaVinci',desc:'מדריך גריידינג צינמטי ל-DaVinci Resolve',cat:'וידאו ועריכה',subcat:'DaVinci Resolve',body:'אני עובד ב-DaVinci Resolve עם קליפ [סוג מצלמה]. תן לי הוראות שלב-אחר-שלב לבניית Teal & Orange grade:\n1) Lift/Gamma/Gain\n2) Color wheels\n3) Curves\n4) Qualifier לעור\n\nתוצאה: מראה קולנועי מקצועי.',starred:true,created:Date.now()-86400000*4},
  {id:'p3',title:'Speed Ramp לקטע אקשן',desc:'יצירת ספיד רמפ סינמטי על קצב',cat:'וידאו ועריכה',subcat:'DaVinci Resolve',body:'תעזור לי לבנות speed ramp ב-DaVinci Resolve לקטע MTB. הקליפ: [תיאור]. רצוי: האטה דרמטית ב-[שניה X], האצה לפני ה-drop. תן הוראות מדויקות כולל Optical Flow ו-Retime Curve.',starred:false,created:Date.now()-86400000*3},
  {id:'p4',title:'פוסט אינסטגרם לסרטון MTB',desc:'כיתוב שיווקי לפוסט ריידינג ברשתות',cat:'כתיבה ותוכן',subcat:'מדיה חברתית',body:'כתוב כיתוב לפוסט אינסטגרם לסרטון MTB שצולם ב[מיקום]. כלול: שורה פותחת חזקה, 2-3 משפטים על החוויה, CTA, ו-10 האשטגים רלוונטיים. טון: אותנטי, נרגש, לא שיווקי מדי.',starred:false,created:Date.now()-86400000*2},
  {id:'p5',title:'פרומפט לתמונת AI מרחפן',desc:'יצירת פרומפט לתמונה קולנועית מרחפן',cat:'רחפן ו-MTB',subcat:'תכנון טיסה',body:'צור פרומפט ל-Midjourney/Copilot לתמונת אוויר של [מיקום] בסגנון cinematic drone photography.\n\nכלול:\n- שעת הצילום (golden hour)\n- גובה הרחפן\n- זווית\n- f-stop\n- תאורה טבעית\n\n--ar 16:9 --v 6',starred:true,created:Date.now()-86400000},
  {id:'p6',title:'סיכום ישיבה + Action Items',desc:'הפיכת הערות ישיבה לסיכום מובנה',cat:'עבודה ותפעול',subcat:'ניהול',body:'להלן הערות מישיבה:\n[הערות]\n\nצור:\n1) סיכום מנהלים ב-3 משפטים\n2) החלטות עיקריות\n3) Action Items עם שם אחראי ותאריך יעד\n4) נושאים לישיבה הבאה\n\nפורמט: מסמך מוכן לשליחה.',starred:false,created:Date.now()}
];

let prompts=[];
let cats={};
let activeCat='הכל';
let activeSubcat='הכל';
let showFavs=false;
let editingId=null;
let viewingId=null;

function load(){
  try{
    const p=localStorage.getItem(STORAGE_KEY);
    const c=localStorage.getItem(CATS_KEY);
    prompts=p?JSON.parse(p):[...DEFAULT_PROMPTS];
    cats=c?JSON.parse(c):{...DEFAULT_CATS};
  }catch(e){
    prompts=[...DEFAULT_PROMPTS];
    cats={...DEFAULT_CATS};
  }
}

function save(){
  localStorage.setItem(STORAGE_KEY,JSON.stringify(prompts));
  localStorage.setItem(CATS_KEY,JSON.stringify(cats));
}

function getFiltered(){
  const q=document.getElementById('search').value.trim().toLowerCase();
  return prompts.filter(p=>{
    if(activeCat!=='הכל'&&p.cat!==activeCat)return false;
    if(activeSubcat!=='הכל'&&p.subcat!==activeSubcat)return false;
    if(showFavs&&!p.starred)return false;
    if(q&&!(p.title+' '+(p.desc||'')+' '+p.body).toLowerCase().includes(q))return false;
    return true;
  });
}

function render(){
  renderStats();
  renderCats();
  renderSubcats();
  renderGrid();
}

function renderStats(){
  const el=document.getElementById('stats');
  const total=prompts.length;
  const starred=prompts.filter(p=>p.starred).length;
  const catCount=Object.keys(cats).length;
  const filtered=getFiltered().length;
  let html=`<div class="stat"><b>${total}</b> פרומפטים</div><div class="stat"><b>${starred}</b> מועדפים</div><div class="stat"><b>${catCount}</b> קטגוריות</div>`;
  if(filtered!==total) html+=`<div class="stat"><b>${filtered}</b> מוצגים</div>`;
  el.innerHTML=html;
}

function renderCats(){
  const el=document.getElementById('cats');
  const allCats=['הכל',...Object.keys(cats)];
  el.innerHTML=allCats.map(c=>`<button class="cat-btn${activeCat===c?' active':''}" onclick="setCat('${escAttr(c)}')">${escHtml(c)}</button>`).join('');
}

function renderSubcats(){
  const el=document.getElementById('subcats');
  if(activeCat==='הכל'){el.innerHTML='';return;}
  const subs=['הכל',...(cats[activeCat]||[])];
  el.innerHTML=subs.map(s=>`<button class="subcat-btn${activeSubcat===s?' active':''}" onclick="setSubcat('${escAttr(s)}')">${escHtml(s)}</button>`).join('');
}

function renderGrid(){
  const el=document.getElementById('grid');
  const filtered=getFiltered();
  if(!filtered.length){
    const q=document.getElementById('search').value.trim();
    el.innerHTML=`<div class="empty"><div class="empty-icon">🔍</div><p>${q?'לא נמצאו תוצאות עבור "'+escHtml(q)+'"':'הספרייה ריקה'}</p><small>${q?'נסה מילות חיפוש אחרות':'לחץ על + פרומפט חדש כדי להתחיל'}</small></div>`;
    return;
  }
  el.innerHTML=filtered.map(p=>`
    <div class="card" onclick="viewPrompt('${p.id}')">
      <div class="card-top">
        <div class="card-badges">
          <span class="badge">${escHtml(p.cat)}</span>
          ${p.subcat?`<span class="badge badge-sub">${escHtml(p.subcat)}</span>`:''}
        </div>
        <button class="card-star${p.starred?' starred':''}" onclick="event.stopPropagation();toggleStar('${p.id}')" title="${p.starred?'הסר ממועדפים':'הוסף למועדפים'}">${p.starred?'★':'☆'}</button>
      </div>
      <div class="card-title">${escHtml(p.title)}</div>
      ${p.desc?`<div class="card-desc">${escHtml(p.desc)}</div>`:''}
      <div class="card-preview">${escHtml(p.body)}</div>
      <div class="card-actions">
        <button class="card-btn" id="copy-${p.id}" onclick="event.stopPropagation();copyPrompt('${p.id}')">📋 העתק</button>
        <button class="card-btn" onclick="event.stopPropagation();sharePrompt('${p.id}')">🔗 שתף</button>
      </div>
    </div>
  `).join('');
}

function escHtml(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function escAttr(s){return String(s).replace(/'/g,"\\'").replace(/"/g,'&quot;')}

function onSearch(){
  const q=document.getElementById('search').value;
  document.getElementById('search-clear').classList.toggle('visible',q.length>0);
  render();
}

function clearSearch(){
  document.getElementById('search').value='';
  document.getElementById('search-clear').classList.remove('visible');
  render();
}

function setCat(c){activeCat=c;activeSubcat='הכל';render()}
function setSubcat(s){activeSubcat=s;render()}

function toggleFavs(){
  showFavs=!showFavs;
  const btn=document.getElementById('fav-btn');
  btn.classList.toggle('active',showFavs);
  btn.title=showFavs?'הצג הכל':'מועדפים בלבד';
  render();
}

function toggleStar(id){
  const p=prompts.find(x=>x.id===id);
  if(p){p.starred=!p.starred;save();render();showToast(p.starred?'נוסף למועדפים ★':'הוסר ממועדפים');}
}

function copyPrompt(id){
  const p=prompts.find(x=>x.id===id);
  if(!p)return;
  navigator.clipboard.writeText(p.body).then(()=>{
    const btn=document.getElementById('copy-'+id);
    if(btn){btn.innerHTML='✓ הועתק';btn.classList.add('copied');setTimeout(()=>{btn.innerHTML='📋 העתק';btn.classList.remove('copied')},2000);}
    showToast('הפרומפט הועתק ✓');
  }).catch(()=>{
    const ta=document.createElement('textarea');
    ta.value=p.body;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);
    showToast('הפרומפט הועתק ✓');
  });
}

function sharePrompt(id){
  const p=prompts.find(x=>x.id===id);
  if(!p)return;
  const text=`📌 ${p.title}\n\n${p.body}`;
  if(navigator.share){navigator.share({title:p.title,text}).catch(()=>{})}
  else{navigator.clipboard.writeText(text).then(()=>showToast('הפרומפט הועתק לשיתוף ✓')).catch(()=>showToast('הפרומפט הועתק ✓'))}
}

function viewPrompt(id){
  const p=prompts.find(x=>x.id===id);
  if(!p)return;
  viewingId=id;
  document.getElementById('view-title').textContent=p.title;
  document.getElementById('view-desc').textContent=p.desc||'';
  document.getElementById('view-body').textContent=p.body;
  document.getElementById('view-badges').innerHTML=`<span class="badge">${escHtml(p.cat)}</span>${p.subcat?`<span class="badge badge-sub">${escHtml(p.subcat)}</span>`:''}`;
  const created=p.created?new Date(p.created).toLocaleDateString('he-IL'):'';
  document.getElementById('view-meta').textContent=created?`נוצר: ${created}`:'';
  document.getElementById('view-copy').innerHTML='📋 העתק פרומפט';
  openModal('modal-view');
}

function copyFromView(){
  const p=prompts.find(x=>x.id===viewingId);
  if(!p)return;
  navigator.clipboard.writeText(p.body).then(()=>{
    document.getElementById('view-copy').innerHTML='✓ הועתק!';
    showToast('הפרומפט הועתק ✓');
    setTimeout(()=>{document.getElementById('view-copy').innerHTML='📋 העתק פרומפט'},2000);
  });
}

function shareFromView(){sharePrompt(viewingId)}

function editFromView(){
  closeModal('modal-view');
  setTimeout(()=>openEdit(viewingId),120);
}

function deleteFromView(){
  if(!confirm('למחוק את הפרומפט הזה לצמיתות?'))return;
  prompts=prompts.filter(x=>x.id!==viewingId);
  save();render();
  closeModal('modal-view');
  showToast('הפרומפט נמחק');
}

function openAdd(){
  editingId=null;
  document.getElementById('modal-title').textContent='פרומפט חדש';
  document.getElementById('f-title').value='';
  document.getElementById('f-desc').value='';
  document.getElementById('f-body').value='';
  document.getElementById('char-count').textContent='0 תווים';
  populateCatSelect();
  openModal('modal-add');
  setTimeout(()=>document.getElementById('f-title').focus(),100);
}

function openEdit(id){
  const p=prompts.find(x=>x.id===id);
  if(!p)return;
  editingId=id;
  document.getElementById('modal-title').textContent='עריכת פרומפט';
  document.getElementById('f-title').value=p.title;
  document.getElementById('f-desc').value=p.desc||'';
  document.getElementById('f-body').value=p.body;
  document.getElementById('char-count').textContent=p.body.length+' תווים';
  populateCatSelect(p.cat,p.subcat);
  openModal('modal-add');
}

function populateCatSelect(selCat,selSub){
  const cs=document.getElementById('f-cat');
  cs.innerHTML=Object.keys(cats).map(c=>`<option value="${escHtml(c)}"${c===selCat?' selected':''}>${escHtml(c)}</option>`).join('');
  updateSubcatOptions(selSub);
}

function updateSubcatOptions(selSub){
  const cat=document.getElementById('f-cat').value;
  const ss=document.getElementById('f-subcat');
  const subs=cats[cat]||[];
  ss.innerHTML=['(ללא)',...subs].map(s=>`<option value="${s===('(ללא)')?'':s}"${(s===selSub||(s==='(ללא)'&&!selSub))?' selected':''}>${s}</option>`).join('');
}

function updateCharCount(){
  const v=document.getElementById('f-body').value;
  document.getElementById('char-count').textContent=v.length+' תווים';
}

function savePrompt(){
  const title=document.getElementById('f-title').value.trim();
  const body=document.getElementById('f-body').value.trim();
  if(!title){showToast('נא להזין כותרת');document.getElementById('f-title').focus();return;}
  if(!body){showToast('נא להזין תוכן פרומפט');document.getElementById('f-body').focus();return;}
  const cat=document.getElementById('f-cat').value;
  const subcat=document.getElementById('f-subcat').value;
  const desc=document.getElementById('f-desc').value.trim();
  if(editingId){
    const p=prompts.find(x=>x.id===editingId);
    if(p){Object.assign(p,{title,desc,cat,subcat,body});}
    showToast('הפרומפט עודכן ✓');
  }else{
    prompts.unshift({id:'p'+Date.now(),title,desc,cat,subcat,body,starred:false,created:Date.now()});
    showToast('הפרומפט נוסף ✓');
  }
  save();render();
  closeModal('modal-add');
}

/* CATEGORY MANAGER */
function openCatManager(){
  renderCatList();
  openModal('modal-cats');
}

function renderCatList(){
  const el=document.getElementById('cat-list');
  el.innerHTML=Object.entries(cats).map(([name,subs])=>`
    <div class="cat-item">
      <div>
        <div class="cat-item-name">${escHtml(name)}</div>
        <div class="cat-item-count">${prompts.filter(p=>p.cat===name).length} פרומפטים · ${subs.join(', ')}</div>
      </div>
      <button class="cat-delete" onclick="deleteCategory('${escAttr(name)}')" title="מחק קטגוריה">×</button>
    </div>
  `).join('');
}

function addCategory(){
  const name=document.getElementById('new-cat-name').value.trim();
  if(!name){showToast('נא להזין שם קטגוריה');return;}
  if(cats[name]){showToast('הקטגוריה כבר קיימת');return;}
  cats[name]=['כללי'];
  save();renderCatList();
  document.getElementById('new-cat-name').value='';
  render();
  showToast('הקטגוריה נוספה ✓');
}

function deleteCategory(name){
  const count=prompts.filter(p=>p.cat===name).length;
  if(count>0&&!confirm(`יש ${count} פרומפטים בקטגוריה זו. למחוק בכל זאת?`))return;
  delete cats[name];
  save();renderCatList();
  if(activeCat===name){activeCat='הכל';activeSubcat='הכל';}
  render();
  showToast('הקטגוריה נמחקה');
}

/* SETTINGS */
function openSettings(){
  document.getElementById('export-count').textContent=prompts.length;
  openModal('modal-settings');
}

function exportJSON(){
  const data=JSON.stringify({prompts,cats},null,2);
  const blob=new Blob([data],{type:'application/json'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='prompt_library_backup_'+new Date().toISOString().slice(0,10)+'.json';
  a.click();
  showToast('קובץ גיבוי יוצא ✓');
}

function exportHTML(){
  const html=document.documentElement.outerHTML;
  const blob=new Blob([html],{type:'text/html'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='prompt_library.html';
  a.click();
  showToast('קובץ HTML יוצא ✓');
}

function importJSON(event){
  const file=event.target.files[0];
  if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const data=JSON.parse(e.target.result);
      if(data.prompts&&Array.isArray(data.prompts)){
        if(!confirm(`ייבוא ${data.prompts.length} פרומפטים. זה ידרוס את הנתונים הנוכחיים. להמשיך?`))return;
        prompts=data.prompts;
        if(data.cats)cats=data.cats;
        save();render();
        closeModal('modal-settings');
        showToast(`יובאו ${prompts.length} פרומפטים ✓`);
      }else{showToast('קובץ לא תקין');}
    }catch(err){showToast('שגיאה בקריאת הקובץ');}
  };
  reader.readAsText(file);
}

function openModal(id){document.getElementById(id).classList.add('open')}
function closeModal(id){document.getElementById(id).classList.remove('open')}

document.querySelectorAll('.modal-bg').forEach(m=>{
  m.addEventListener('click',e=>{if(e.target===m)closeModal(m.id)});
});
document.addEventListener('keydown',e=>{
  if(e.key==='Escape')document.querySelectorAll('.modal-bg.open').forEach(m=>closeModal(m.id));
  if((e.ctrlKey||e.metaKey)&&e.key==='k'){e.preventDefault();document.getElementById('search').focus();}
});

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  clearTimeout(t._timer);
  t._timer=setTimeout(()=>t.classList.remove('show'),2400);
}

load();
render();
</script>
</body>
</html>
